# ArgoCD Application for the hppl site. Apply once into the argocd namespace:
#   kubectl apply -f k8s/argocd/application.yaml
# After that, every push to main auto-deploys (CI builds the image + bumps the
# tag in values.yaml; ArgoCD self-heals to match).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hppl
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Huppl/hppl.git
    targetRevision: main
    path: k8s/helm/hppl
  destination:
    server: https://kubernetes.default.svc
    namespace: hppl
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
