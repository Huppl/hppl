# Traefik IngressRoute â€” same pattern as the existing cluster apps.
# HTTPS on the `websecure` entrypoint; cert issued automatically by the
# `letsencrypt` ACME resolver (HTTP-01). The `web` entrypoint already redirects
# HTTPâ†’HTTPS cluster-wide.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hppl
  labels:
    app: hppl
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`{{ .Values.domain }}`)
      services:
        - name: hppl
          port: {{ .Values.service.port }}
  tls:
    certResolver: {{ .Values.certResolver }}
