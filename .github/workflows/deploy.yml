name: deploy

# Build the image on GitHub Release publish, then bump the Helm image tag so
# ArgoCD picks it up. The tag-bump commit only touches values.yaml and is
# filtered out below (plus a [skip ci] guard) so it never re-triggers a build.
on:
  release:
    types: [published]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # push the tag-bump commit
  packages: write # push to ghcr.io

jobs:
  build-and-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/huppl/hppl:latest
            ghcr.io/huppl/hppl:${{ github.event.release.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump image tag in Helm values
        run: |
          sed -i -E "s|^(\s*tag:).*|\1 \"${{ github.event.release.tag_name }}\"|" k8s/helm/hppl/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/helm/hppl/values.yaml
          git commit -m "ci: deploy ${{ github.event.release.tag_name }} [skip ci]" || echo "no change"
          git push
