name: deploy

# Build the image on GitHub Release publish, then bump the Helm image tag so
# ArgoCD picks it up. The tag-bump commit only touches values.yaml and is
# filtered out below (plus a [skip ci] guard) so it never re-triggers a build.
on:
  release:
    types: [published]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # push the tag-bump commit
  packages: write # push to ghcr.io

jobs:
  build-and-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/huppl/hppl:latest
            ghcr.io/huppl/hppl:${{ github.event.release.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump image tag in Helm values
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Fetch current file SHA (needed for API update)
          FILE_SHA=$(gh api repos/Huppl/hppl/contents/k8s/helm/hppl/values.yaml --jq '.sha')
          # Read current content, replace tag line
          CURRENT=$(gh api repos/Huppl/hppl/contents/k8s/helm/hppl/values.yaml --jq '.content' | base64 -d)
          UPDATED=$(echo "$CURRENT" | sed -E "s|^(\s*tag:).*|\1 \"$TAG\"|")
          # Push updated file via API (bypasses branch protection for GITHUB_TOKEN)
          echo "{\"message\":\"ci: deploy $TAG [skip ci]\",\"sha\":\"$FILE_SHA\",\"content\":\"$(echo "$UPDATED" | base64 -w 0)\"}" > /tmp/payload.json
          gh api repos/Huppl/hppl/contents/k8s/helm/hppl/values.yaml -X PUT --input /tmp/payload.json
